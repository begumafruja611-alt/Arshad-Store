<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arshad Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        h1, h2 { font-family: 'Outfit', sans-serif; }
        .glass-header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bottom-nav { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); }
        .app-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s; }
        .app-card:active { transform: scale(0.98); }
        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="glass-header sticky top-0 z-40 p-4">
        <div class="flex justify-between items-center max-w-2xl mx-auto">
            <h1 class="text-2xl font-extrabold tracking-tight text-white">Arshad <span class="text-blue-500">Store</span></h1>
            <div id="user-info" class="text-xs font-medium text-slate-400 bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">Guest</div>
        </div>
        <div class="max-w-2xl mx-auto mt-4">
            <div class="relative">
                <input type="text" id="search-bar" placeholder="Search apps & games..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-12 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                <svg class="w-5 h-5 absolute left-4 top-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6 py-2">
            <button onclick="filterCat('All')" class="cat-pill bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap">All</button>
            <button onclick="filterCat('Games')" class="cat-pill bg-slate-800 text-slate-300 px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap">Games</button>
            <button onclick="filterCat('Productivity')" class="cat-pill bg-slate-800 text-slate-300 px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap">Productivity</button>
            <button onclick="filterCat('Social')" class="cat-pill bg-slate-800 text-slate-300 px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap">Social</button>
        </div>

        <div id="app-grid" class="grid grid-cols-1 gap-4">
            <div class="text-center py-20 opacity-50">Connecting to store...</div>
        </div>
    </main>

    <nav class="bottom-nav fixed bottom-0 left-0 right-0 p-4 z-50">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button class="flex flex-col items-center text-blue-500">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
                <span class="text-[10px] mt-1 font-bold">Store</span>
            </button>
            <button class="flex flex-col items-center text-slate-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span class="text-[10px] mt-1 font-bold">Library</span>
            </button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, setDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOyphVdAxgf4nqxPgii6xAf_ZR6Wehsaw",
            authDomain: "store-9062b.firebaseapp.com",
            projectId: "store-9062b",
            storageBucket: "store-9062b.firebasestorage.app",
            messagingSenderId: "378446293950",
            appId: "1:378446293950:web:957742054d2b5e09b0e7ef"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userDownloads = {};
        let allApps = [];
        let currentFilter = 'All';

        // Sign in anonymously for User App if not logged in
        signInAnonymously(auth).catch(err => console.error("Auth error", err));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('user-info').innerText = "User ID: " + user.uid.substring(0, 5);
                fetchDownloads(user.uid);
            }
        });

        // Fetch User's download history to determine button state
        async function fetchDownloads(uid) {
            onSnapshot(collection(db, `users/${uid}/downloads`), (snap) => {
                userDownloads = {};
                snap.forEach(doc => {
                    userDownloads[doc.id] = doc.data().version;
                });
                renderStore();
            });
        }

        // Live App Feed
        const q = query(collection(db, "apps"), where("status", "==", "approved"));
        onSnapshot(q, (snapshot) => {
            allApps = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
            renderStore();
        });

        function renderStore() {
            const container = document.getElementById('app-grid');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();
            
            const filtered = allApps.filter(app => {
                const matchesSearch = app.name.toLowerCase().includes(searchTerm);
                const matchesCat = currentFilter === 'All' || app.category === currentFilter;
                return matchesSearch && matchesCat;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-500">No apps found</div>`;
                return;
            }

            container.innerHTML = filtered.map(app => {
                const installedVersion = userDownloads[app.id];
                let btnHtml = '';

                if (!installedVersion) {
                    btnHtml = `<button onclick="handleAction('${app.id}', '${app.name}', '${app.version}', '${app.apkUrl}')" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-900/20">Install</button>`;
                } else if (installedVersion === app.version) {
                    btnHtml = `<button onclick="window.open('${app.apkUrl}')" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-sm font-bold border border-slate-700">Open</button>`;
                } else {
                    btnHtml = `<button onclick="handleAction('${app.id}', '${app.name}', '${app.version}', '${app.apkUrl}')" class="bg-emerald-600 text-white px-6 py-2 rounded-xl text-sm font-bold">Update</button>`;
                }

                return `
                <div class="app-card p-4 rounded-3xl flex items-center gap-4">
                    <img src="${app.icon}" class="w-16 h-16 rounded-2xl object-cover bg-slate-800">
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-white truncate">${app.name}</h3>
                        <p class="text-xs text-slate-400">${app.category} • v${app.version}</p>
                    </div>
                    <div>${btnHtml}</div>
                </div>
                `;
            }).join('');
        }

        // Handle Install/Update
        window.handleAction = async (id, name, version, url) => {
            const user = auth.currentUser;
            if (!user) return alert("Signing you in...");

            // 1. Record the download/update in Firestore
            await setDoc(doc(db, `users/${user.uid}/downloads`, id), {
                appId: id,
                appName: name,
                version: version,
                timestamp: serverTimestamp()
            });

            // 2. Trigger File Download
            window.open(url, '_blank');
        };

        // UI Interactions
        document.getElementById('search-bar').addEventListener('input', renderStore);

        window.filterCat = (cat) => {
            currentFilter = cat;
            document.querySelectorAll('.cat-pill').forEach(btn => {
                btn.classList.toggle('bg-blue-600', btn.innerText === cat);
                btn.classList.toggle('text-white', btn.innerText === cat);
                btn.classList.toggle('bg-slate-800', btn.innerText !== cat);
                btn.classList.toggle('text-slate-300', btn.innerText !== cat);
            });
            renderStore();
        };

    </script>
</body>
</html>
